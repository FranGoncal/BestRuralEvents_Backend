services:
  discovery-service:
    build:
      context: ./EurekaNamingService
    container_name: discovery-service
    ports:
      - "8761:8761"

  api-gateway:
    build:
      context: ./CloudGateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - discovery-service
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka

  user-service:
    build:
      context: ./UserService
    container_name: user-service
    ports:
      - "8081:8081"
    depends_on:
      - discovery-service
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka

  auth-service:
    build:
      context: ./AuthService
    container_name: auth-service
    ports:
      - "8082:8082"
    depends_on:
      - discovery-service
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka

  event-service:
    build:
      context: ./EventService
    container_name: event-service
    ports:
      - "8083:8083"
    depends_on:
      - discovery-service
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka

  review-service:
    build:
      context: ./ReviewService
    container_name: review-service
    ports:
      - "8084:8084"
    depends_on:
      - discovery-service
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka

  ticket-service:
    build:
      context: ./TicketService
    container_name: ticket-service
    ports:
      - "8085:8085"
    depends_on:
      - discovery-service
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka

  notification-service:
    build:
      context: ./NotificationService
    container_name: notification-service
    ports:
      - "8086:8086"
    depends_on:
      - discovery-service
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka

  payment-service:
    build:
      context: ./PaymentService
    container_name: payment-service
    ports:
      - "8087:8087"
    depends_on:
      - discovery-service
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka

  content-service:
    build:
      context: ./ContentService
    container_name: content-service
    ports:
      - "8088:8088"
    depends_on:
      - discovery-service
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka

  admin-frontend-service:
    build:
      context: ./AdminFrontendService
    container_name: admin-frontend-service
    ports:
      - "8090:8090"
    depends_on:
      - discovery-service
      - auth-service
      - content-service
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka